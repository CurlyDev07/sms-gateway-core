services:
  sms-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-app
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "127.0.0.1:8081:8000"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8081

      DB_CONNECTION: mysql
      DB_HOST: YOUR_DB_HOST
      DB_PORT: "3306"
      DB_DATABASE: YOUR_DB_NAME
      DB_USERNAME: YOUR_DB_USER
      DB_PASSWORD: YOUR_DB_PASSWORD

      REDIS_CLIENT: phpredis
      REDIS_HOST: sms-redis
      REDIS_PORT: "6379"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: file

      SMS_DRIVER: python
      SMS_PYTHON_API_URL: http://host.docker.internal:9000
    depends_on:
      - sms-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sms-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-worker
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=1 --timeout=120
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8081

      DB_CONNECTION: mysql
      DB_HOST: YOUR_DB_HOST
      DB_PORT: "3306"
      DB_DATABASE: YOUR_DB_NAME
      DB_USERNAME: YOUR_DB_USER
      DB_PASSWORD: YOUR_DB_PASSWORD

      REDIS_CLIENT: phpredis
      REDIS_HOST: sms-redis
      REDIS_PORT: "6379"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: file

      SMS_DRIVER: python
      SMS_PYTHON_API_URL: http://host.docker.internal:9000
    depends_on:
      - sms-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sms-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-scheduler
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8081

      DB_CONNECTION: mysql
      DB_HOST: YOUR_DB_HOST
      DB_PORT: "3306"
      DB_DATABASE: YOUR_DB_NAME
      DB_USERNAME: YOUR_DB_USER
      DB_PASSWORD: YOUR_DB_PASSWORD

      REDIS_CLIENT: phpredis
      REDIS_HOST: sms-redis
      REDIS_PORT: "6379"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: file

      SMS_DRIVER: python
      SMS_PYTHON_API_URL: http://host.docker.internal:9000
    depends_on:
      - sms-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sms-redis:
    image: redis:7-alpine
    container_name: sms-redis
    command: redis-server --appendonly yes
    volumes:
      - sms_redis_data:/data

volumes:
  sms_redis_data:
