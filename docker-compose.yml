services:
  sms-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-app
    working_dir: /var/www/html
    command: php artisan serve --host=0.0.0.0 --port=8000
    ports:
      - "127.0.0.1:8081:8000"
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8081

      DB_CONNECTION: mysql
      DB_HOST: sms-db
      DB_PORT: "3306"
      DB_DATABASE: sms_gateway_core
      DB_USERNAME: smsgateway
      DB_PASSWORD: CHANGE_THIS_SMS_DB_PASSWORD

      REDIS_CLIENT: phpredis
      REDIS_HOST: sms-redis
      REDIS_PORT: "6379"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: file

      SMS_DRIVER: python
      SMS_PYTHON_API_URL: http://172.19.0.1:9000
    depends_on:
      - sms-db
      - sms-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sms-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-worker
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=1 --timeout=120
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8081

      DB_CONNECTION: mysql
      DB_HOST: sms-db
      DB_PORT: "3306"
      DB_DATABASE: sms_gateway_core
      DB_USERNAME: smsgateway
      DB_PASSWORD: CHANGE_THIS_SMS_DB_PASSWORD

      REDIS_CLIENT: phpredis
      REDIS_HOST: sms-redis
      REDIS_PORT: "6379"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: file

      SMS_DRIVER: python
      SMS_PYTHON_API_URL: http://172.19.0.1:9000
    depends_on:
      - sms-db
      - sms-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sms-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms-scheduler
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://127.0.0.1:8081

      DB_CONNECTION: mysql
      DB_HOST: sms-db
      DB_PORT: "3306"
      DB_DATABASE: sms_gateway_core
      DB_USERNAME: smsgateway
      DB_PASSWORD: CHANGE_THIS_SMS_DB_PASSWORD

      REDIS_CLIENT: phpredis
      REDIS_HOST: sms-redis
      REDIS_PORT: "6379"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: file

      SMS_DRIVER: python
      SMS_PYTHON_API_URL: http://172.19.0.1:9000
    depends_on:
      - sms-db
      - sms-redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sms-redis:
    image: redis:7-alpine
    container_name: sms-redis
    command: redis-server --appendonly yes
    volumes:
      - sms_redis_data:/data

  sms-db:
    image: mysql:8.0
    container_name: sms-db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: sms_gateway_core
      MYSQL_USER: smsgateway
      MYSQL_PASSWORD: CHANGE_THIS_SMS_DB_PASSWORD
      MYSQL_ROOT_PASSWORD: CHANGE_THIS_SMS_ROOT_PASSWORD
    volumes:
      - sms_db_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3307:3306"

volumes:
  sms_redis_data:
  sms_db_data: